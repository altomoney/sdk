name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate workspace
        run: bun run validate

      - name: Detect pending changesets
        id: changesets
        shell: bash
        run: |
          shopt -s nullglob
          files=(.changeset/*.md)
          pending=0

          for file in "${files[@]}"; do
            if [[ "$(basename "$file")" != "README.md" ]]; then
              pending=1
              break
            fi
          done

          if [[ "$pending" -eq 1 ]]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when nothing is pending
        if: steps.changesets.outputs.has_changesets != 'true'
        run: echo "No unreleased changesets found."

      - name: Version packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: bun run version-packages

      - name: Commit version updates
        if: steps.changesets.outputs.has_changesets == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset package.json packages bun.lock

          if git diff --cached --quiet; then
            echo "No versioned file changes to commit."
            exit 0
          fi

          git commit -m "chore: version packages [skip ci] [skip release]"
          git push

      - name: Configure npm token fallback
        if: steps.changesets.outputs.has_changesets == 'true' && env.NPM_TOKEN != ''
        shell: bash
        run: |
          printf "//registry.npmjs.org/:_authToken=%s\n" "$NODE_AUTH_TOKEN" > ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - name: Publish changed packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: bun run release
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
